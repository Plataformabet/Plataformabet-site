<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetMaster APP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061a13;
  color:white;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#16a34a,#064e3b);
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.loginBtn{
  background:#facc15;
  color:black;
  padding:6px 12px;
  border-radius:8px;
  font-weight:bold;
}

.balance{color:#facc15}

/* BANNER */
.banner456{
  background:linear-gradient(90deg,#16a34a,#22c55e);
  padding:12px;
  text-align:center;
  font-weight:bold;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:0.7}
  100%{opacity:1}
}

/* JACKPOT */
.jackpot{
  text-align:center;
  font-size:22px;
  color:#facc15;
  font-weight:bold;
  margin:10px;
  animation:zoom 1.5s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1)}
  to{transform:scale(1.1)}
}

/* TABS */
.tabs{
  display:flex;
  justify-content:space-around;
  margin:10px;
}

.tab{
  padding:10px;
  background:#14532d;
  border-radius:10px;
  cursor:pointer;
}

.activeTab{background:#22c55e}

/* PAGES */
.page{display:none;padding-bottom:60px}
.active{display:block}

/* GAMES */
.games{display:flex;overflow-x:auto}

/* CARD */
.card{
  min-width:130px;
  height:120px;
  border-radius:12px;
  background:linear-gradient(180deg,#14532d,#052e16);
  display:flex;
  align-items:end;
  justify-content:center;
  padding:10px;
  margin:5px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,255,100,0.3);
}
.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(0,255,100,0.6);
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#14532d;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.box{
  background:linear-gradient(180deg,#166534,#052e16);
  padding:20px;
  border-radius:15px;
  width:90%;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.links{
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.close{
  text-align:center;
  margin-top:10px;
  cursor:pointer;
}

/* CHAT */
#chatBox{
  height:150px;
  overflow:auto;
  background:#022c22;
  padding:10px;
  margin:10px;
  border-radius:10px;
  font-size:12px;
}

/* SLOT */
#slot{display:none;text-align:center}
.reel{font-size:40px}
</style>
</head>

<body>

<header>
  <div>BetMaster</div>
  <div class="balance">R$ <span id="saldo">100</span></div>
  <div class="loginBtn" onclick="abrirLogin()">Login</div>
</header>

<div class="banner456">🎰 Bônus até R$5.555</div>

<div class="jackpot">
  JACKPOT R$ <span id="jackpot">10348114</span>
</div>

<div class="tabs">
  <div class="tab activeTab">Popular</div>
  <div class="tab">Recente</div>
  <div class="tab">Favoritos</div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<h3>🔥 Populares</h3>
<div class="games">
  <div class="card" onclick="openSlot()">🐯 Tigrinho</div>
  <div class="card" onclick="openSlot()">🎰 Fortune</div>
</div>

<h3>🏆 Ranking</h3>
<div id="ranking"></div>

<h3>💬 Chat</h3>
<div id="chatBox"></div>

</div>

<!-- SLOT -->
<div id="slot">
<h2>🎰 Slot</h2>
<span class="reel" id="r1">🍒</span>
<span class="reel" id="r2">🍋</span>
<span class="reel" id="r3">🍉</span>
<div id="status"></div>
<button onclick="spin()">Girar</button>
<button onclick="voltar()">Voltar</button>
</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <div class="box">
    <h2>Login</h2>
    <input id="userInput" placeholder="Usuário">
    <input id="passInput" placeholder="Senha" type="password">
    <button onclick="login()">Entrar</button>
    <div class="links">
      <span onclick="abrirRegistro()">Criar conta</span>
      <span onclick="alert('Senha salva no navegador')">Esqueci</span>
    </div>
    <div class="close" onclick="fecharLogin()">Fechar</div>
  </div>
</div>

<!-- REGISTRO -->
<div id="registerModal" class="modal">
  <div class="box">
    <h2>Registro</h2>
    <input id="newUser" placeholder="Usuário">
    <input id="newPass" placeholder="Senha" type="password">
    <button onclick="registrar()">Criar</button>
    <div class="close" onclick="fecharRegistro()">Voltar</div>
  </div>
</div>

<div class="footer">
  <div onclick="home()">🏠</div>
  <div onclick="bonus()">🎁</div>
  <div onclick="abrirLogin()">👤</div>
</div>

<script>
let saldo = localStorage.getItem("saldo") || 100;
document.getElementById("saldo").innerText = saldo;

/* LOGIN */
function abrirLogin(){loginModal.style.display="flex"}
function fecharLogin(){loginModal.style.display="none"}

function abrirRegistro(){
  loginModal.style.display="none";
  registerModal.style.display="flex";
}
function fecharRegistro(){registerModal.style.display="none"}

function registrar(){
  localStorage.setItem("user",newUser.value);
  localStorage.setItem("pass",newPass.value);
  alert("Conta criada!");
  fecharRegistro();
}

function login(){
  if(userInput.value==localStorage.getItem("user") &&
     passInput.value==localStorage.getItem("pass")){
    alert("Logado!");
    fecharLogin();
  }else{
    alert("Erro");
  }
}

/* BONUS */
function bonus(){
  saldo+=20;
  atualizar();
}

/* SLOT */
function openSlot(){
  document.getElementById("home").style.display="none";
  slot.style.display="block";
}
function voltar(){
  slot.style.display="none";
  home();
}
function home(){
  document.getElementById("home").style.display="block";
}

/* ATUALIZAR */
function atualizar(){
  document.getElementById("saldo").innerText = saldo;
  localStorage.setItem("saldo",saldo);
}

/* SPIN */
function spin(){
  if(saldo<10){status.innerText="Sem saldo";return;}
  saldo-=10;
  atualizar();

  let s=["🍒","🍋","🍉","💎","7️⃣"];
  r1.innerText=s[Math.random()*5|0];
  r2.innerText=s[Math.random()*5|0];
  r3.innerText=s[Math.random()*5|0];

  if(r1.innerText===r2.innerText && r2.innerText===r3.innerText){
    saldo+=100;
    status.innerText="🔥 GANHOU!";
    new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3").play();
  }else{
    status.innerText="❌ Perdeu";
  }
  atualizar();
}

/* CHAT */
let msgs=["João ganhou R$500","Maria perdeu","Carlos JACKPOT"];
setInterval(()=>{
  chatBox.innerHTML+="<div>"+msgs[Math.random()*msgs.length|0]+"</div>";
  chatBox.scrollTop=chatBox.scrollHeight;
},2000);

/* RANKING */
ranking.innerHTML="1. PlayerX<br>2. PlayerY<br>3. PlayerZ";

/* JACKPOT */
setInterval(()=>{
  let j=document.getElementById("jackpot");
  j.innerText=parseInt(j.innerText)+Math.floor(Math.random()*50);
},1000);
</script>

</body>
 </html>
