<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetMaster Ultimate</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071f16;
  color:white;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#16a34a,#064e3b);
  padding:12px;
  display:flex;
  justify-content:space-between;
}

/* SALDO */
.balance{
  color:#facc15;
}

/* CARROSSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}
.banner{
  min-width:85%;
  height:130px;
  border-radius:12px;
  background:linear-gradient(45deg,#22c55e,#14532d);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* SEÇÕES */
.section{
  padding:10px;
}
.games{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

/* CARD */
.card{
  min-width:130px;
  height:120px;
  border-radius:12px;
  background:linear-gradient(180deg,#14532d,#052e16);
  display:flex;
  align-items:end;
  justify-content:center;
  padding:10px;
  font-size:14px;
}

/* SLOT */
#slot{
  display:none;
  text-align:center;
  padding:20px;
}
.reel{
  font-size:45px;
  margin:10px;
}

/* BOTÃO */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

/* STATUS */
.status{
  margin:10px;
  font-weight:bold;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#14532d;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <div>BetMaster</div>
  <div class="balance">R$ <span id="saldo">100</span></div>
</header>

<!-- CARROSSEL -->
<div class="carousel">
  <div class="banner">🔥 Bônus Diário</div>
  <div class="banner">💰 Ganhe até R$500</div>
  <div class="banner">🎰 Slots Premium</div>
</div>

<div id="lobby">

<div class="section">
<h3>🔥 Populares</h3>
<div class="games">
  <div class="card" onclick="openSlot()">🐯 Tigrinho</div>
  <div class="card">🎰 Fortune</div>
  <div class="card">💎 Gems</div>
</div>
</div>

<div class="section">
<h3>🎰 Slots</h3>
<div class="games">
  <div class="card">🍒 Classic</div>
  <div class="card">💰 Gold</div>
  <div class="card">🎲 Vegas</div>
</div>
</div>

</div>

<!-- SLOT -->
<div id="slot">
  <h2>🎰 Slot</h2>

  <div>
    <span class="reel" id="r1">🍒</span>
    <span class="reel" id="r2">🍋</span>
    <span class="reel" id="r3">🍉</span>
  </div>

  <div class="status" id="status"></div>

  <button onclick="spin()">Girar R$10</button>
  <br><br>
  <button onclick="voltar()">Voltar</button>
</div>

<div class="footer">
  <div onclick="home()">🏠</div>
  <div onclick="bonus()">🎁</div>
  <div onclick="deposito()">💰</div>
  <div onclick="alert('VIP Nível 1')">👑</div>
</div>

<script>
let saldo = localStorage.getItem("saldo") || 100;
let historico = JSON.parse(localStorage.getItem("hist")) || [];

document.getElementById("saldo").innerText = saldo;

function salvar(){
  localStorage.setItem("saldo", saldo);
  localStorage.setItem("hist", JSON.stringify(historico));
}

function atualizar(){
  document.getElementById("saldo").innerText = saldo;
}

/* NAVEGAÇÃO */
function openSlot(){
  lobby.style.display="none";
  slot.style.display="block";
}
function voltar(){
  slot.style.display="none";
  lobby.style.display="block";
}
function home(){voltar();}

/* DEPÓSITO */
function deposito(){
  saldo+=50;
  salvar();
  atualizar();
  alert("Depósito +50");
}

/* BÔNUS */
function bonus(){
  saldo+=20;
  salvar();
  atualizar();
  alert("Bônus diário +20");
}

/* SLOT */
function spin(){
  if(saldo<10){
    status.innerText="Sem saldo";
    return;
  }

  saldo-=10;

  let s=["🍒","🍋","🍉","💎","7️⃣"];

  let interval=setInterval(()=>{
    r1.innerText=s[Math.floor(Math.random()*5)];
    r2.innerText=s[Math.floor(Math.random()*5)];
    r3.innerText=s[Math.floor(Math.random()*5)];
  },100);

  setTimeout(()=>{
    clearInterval(interval);

    let win = (r1.innerText===r2.innerText && r2.innerText===r3.innerText);

    if(win){
      saldo+=100;
      status.innerText="🔥 GANHOU R$100!";
      historico.push("Ganhou");
    }else{
      status.innerText="❌ Perdeu";
      historico.push("Perdeu");
    }

    salvar();
    atualizar();

  },1200);
}
</script>

</body>
</html>
